<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>CSS padding</title>
        <style>
            * {
                margin: 0;
            }

            .box {
                width: 60px;
                height: 60px;
                color: #fff;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .box1 {
                background-color: #333;
            }

            .box2 {
                background-color: orange;
            }

            .box3 {
                background-color: firebrick;
                padding: 10px;
            }
        </style>
    </head>

    <body>
        <div class="box box1">Box1</div>
        <div class="box box2">Box2</div>
        <div class="box box3">Box3</div>
    </body>
</html>
