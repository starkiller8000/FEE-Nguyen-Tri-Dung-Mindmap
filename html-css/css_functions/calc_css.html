<!DOCTYPE html>
<html>
    <head>
        <title>rgb function css</title>
        <meta charset="utf-8">
        <style>
            * {
                margin: 0;
            }

            .box {
                width: calc(120px - 100px);
                height: 120px;
                background: rgb(139, 95, 95);
            }
        </style>
    </head>

    <body>
        <div class="box"></div>
        <h1>CSS functions</h1>
        <ul>
            <li>val()</li>
            <li>linear-gradient()</li>
            <li>rgba()</li>
            <li>rgb()</li>
            <li>calc()</li>
            <li>attr()</li>
        </ul>
    </body>
</html>
