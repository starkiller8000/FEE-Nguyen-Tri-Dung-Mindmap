<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>css pseudo classes</title>
        <style>
            * {
                margin: 0;
            }

            .box {
                width: 100%;
                height: 120px;
                background: rgb(190, 124, 157);
            }

            h2::first-letter {
                font-size: 50px;
            }
            h1::first-line {
                font-size: 50px;
            }
        </style>
    </head>

    <body>
        <div class="box"></div>

        <h1>CSS pseudo elements <br> dong thu 2</h1>
        
        <h2>CSS pseudo elements</h2>
    </body>
</html>
