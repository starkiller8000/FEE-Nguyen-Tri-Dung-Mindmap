<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>css pseudo classes</title>
        <style>
            * {
                margin: 0;
            }

            .box {
                width: 100%;
                height: 120px;
                background: rgb(190, 124, 157);
            }

            ::selection {
                background-color: violet;
                color: #fff;
            }
        </style>
    </head>

    <body>
        <div class="box"></div>

        <h1>CSS pseudo elements</h1>
        <h1>CSS pseudo elements</h1>
    </body>
</html>
