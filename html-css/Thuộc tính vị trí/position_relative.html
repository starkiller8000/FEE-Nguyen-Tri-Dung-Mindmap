<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>position relative</title>
        <style>
            html, body {
                margin: 0;
            }

            h1 {
                position: relative; 
                /* relative lấy chính mình là gốc tọa độ */
                top: 100px;
                left: 100px;
            }
        </style>
    </head>

    <body>
        <h1>Position</h1>
        <ul>
            <li>Relative</li>
            <li>Absolute</li>
            <li>Fixed</li>
            <li>Sticky</li>
        </ul>
    </body>
</html>
