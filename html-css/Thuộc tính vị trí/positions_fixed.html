<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>position relative</title>
        <style>
            html, body {
                margin: 0;
            }

            
            h1 {
                padding: 0 16px;
                color: #fff;
                background-color: #333;
                position: sticky;
                position: -webkit-sticky;
                top: 0;
            }

            ul {
                height: 2000px;
            }
        </style>
    </head>

    <body>
        <h1>Position</h1>
        <ul>
            <li>Relative</li>
            <li>Absolute</li>
            <li>Fixed</li>
            <li>Sticky</li>
        </ul>
    </body>
</html>
