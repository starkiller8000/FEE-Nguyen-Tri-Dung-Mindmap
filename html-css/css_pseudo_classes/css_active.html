<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>css pseudo classes</title>
        <style>
            * {
                margin: 0;
            }

            .box {
                width: 100%;
                height: 120px;
                background: rgb(190, 124, 157);
            }

            .box:active {
                background-color: black;
            }

            h1:active {
                color: red;
            }
        </style>
    </head>

    <body>
        <div class="box"></div>

        <h1>CSS pseudo-class</h1>
    </body>
</html>
