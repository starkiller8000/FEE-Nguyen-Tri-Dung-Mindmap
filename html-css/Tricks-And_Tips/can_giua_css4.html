<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>centralize</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            .box {
                background-color: orange;
                height: 100px;
                width: 100%;

                position: relative;
            }

            h3 {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
            }
        </style>
    </head>

    <body>
        <div class="box">
            <h3>CENTER ME</h3>
        </div>
    </body>
</html>
