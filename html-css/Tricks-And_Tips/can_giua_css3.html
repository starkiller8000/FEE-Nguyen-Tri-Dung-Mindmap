<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>centralize</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            .box {
                background-color: orange;
                height: 100px;
                width: 100%;

                display: flex;
                align-items: center; 
                /* căn giữa theo chiều dọc */

                justify-content: center;
                /* space-around
                    space-between */
            }
        </style>
    </head>

    <body>
        <div class="box">
            <h3>CENTER ME</h3>
        </div>
    </body>
</html>
