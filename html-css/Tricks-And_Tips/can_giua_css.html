<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>centralize</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            .box {
                background-color: orange;
                height: 100px;
                width: 100%;

                text-align: center;
                line-height: 100px;
                /* h3 được thừa kế */
            }
        </style>
    </head>

    <body>
        <div class="box">
            <h3>CENTER ME</h3>
        </div>
    </body>
</html>
